[project]
site_name = "moyo"
site_description = "A fast and robust crystal symmetry finder, written in Rust."
site_author = "Kohei Shinohara"
site_url = "https://spglib.github.io/moyo/"
copyright = "Copyright &copy; 2023, Kohei Shinohara"

docs_dir = "docs"

repo_url = "https://github.com/spglib/moyo"
repo_name = "spglib/moyo"

nav = [
    { "Home" = "index.md" },
]

# Deep-purple heading accents read as the parent hub, distinct from the indigo
# Python (moyopy) and teal C (moyoc) docs.
extra_css = ["stylesheets/extra.css"]

# Theme
[project.theme]
name = "material"
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "deep-purple"
accent = "deep-purple"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep-purple"
accent = "deep-purple"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
# Render :simple-...: / :octicons-...: icons and :emoji: shortcodes as inline
# SVGs. Zensical's twemoji index also bundles the material/simple/octicons icon
# sets under templates/.icons.
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
