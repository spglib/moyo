[project]
site_name = "moyo-wasm"
site_description = "JavaScript and WebAssembly interface of moyo, a fast and robust crystal symmetry finder."
site_author = "Kohei Shinohara"
site_url = "https://spglib.github.io/moyo/js/"
copyright = "Copyright &copy; 2023, Kohei Shinohara"

docs_dir = "docs"

repo_url = "https://github.com/spglib/moyo"
repo_name = "spglib/moyo"

nav = [
    { "moyo interfaces" = [
        { "Overview" = "/moyo/" },
        { "Python" = "/moyo/python/" },
        { "C / Fortran" = "/moyo/c/" },
        { "Rust (docs.rs)" = "https://docs.rs/moyo" },
        { "Web viewer" = "/moyo/viewer/" },
    ] },
    { "Introduction" = "index.md" },
    { "Standardization of Crystal Structures" = "/moyo/standardization/" },
    { "Standardization of Subperiodic Structures" = "/moyo/layer_standardization/" },
    { "API Reference" = "api/index.md" },
]

# Orange heading accents to distinguish the JS / WASM docs from the indigo
# Python (moyopy) and teal C (moyoc) docs.
extra_css = ["stylesheets/extra.css"]

# Theme
[project.theme]
name = "material"
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "orange"
accent = "orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "orange"
accent = "orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# Markdown extensions
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
