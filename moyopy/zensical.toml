[project]
site_name = "moyopy"
site_description = "Python interface of moyo, a fast and robust crystal symmetry finder."
site_author = "Kohei Shinohara"
site_url = "https://spglib.github.io/moyo/python/"
copyright = "Copyright &copy; 2023, Kohei Shinohara"

docs_dir = "docs"

repo_url = "https://github.com/spglib/moyo"
repo_name = "spglib/moyo"

nav = [
    { "moyo interfaces" = [
        { "Overview" = "/moyo/" },
        { "C / Fortran" = "/moyo/c/" },
        { "JavaScript / WASM" = "/moyo/js/" },
        { "Rust (docs.rs)" = "https://docs.rs/moyo" },
        { "Web viewer" = "/moyo/viewer/" },
    ] },
    { "Introduction" = "index.md" },
    { "Examples" = "examples/index.md" },
    { "Standardization of Crystal Structures" = "/moyo/standardization/" },
    { "Standardization of Subperiodic Structures" = "/moyo/layer_standardization/" },
    { "Migration Guide from spglib" = "migration.md" },
    { "API Reference" = [
        "api.md",
        { "Layer Group" = "api_layer_group.md" },
        { "Magnetic Space Group" = "api_magnetic_space_group.md" },
    ] },
]

# MathJax: render dollar-math converted by pymdownx.arithmatex (generic = true)
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js",
]

# Indigo heading accents to distinguish the Python docs from the teal C (moyoc) docs.
extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
name = "material"
language = "en"
logo = "assets/logo.svg"
favicon = "assets/logo.svg"
features = [
    "content.code.copy",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Markdown extensions (replacing MyST myst_enable_extensions)
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# ----------------------------------------------------------------------------
# mkdocstrings: API reference generated from the .pyi type stubs
#
# allow_inspection = false forces griffe to use the static .pyi stubs only.
# Inspecting the compiled _moyopy extension makes PyO3 classes (module="moyopy")
# alias back to the package, triggering a CyclicAliasError; static-only avoids it
# and lets us reference the clean public paths (moyopy.Cell, ...).
# ----------------------------------------------------------------------------
[project.plugins.mkdocstrings.handlers.python]
paths = ["python"]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://spglib.readthedocs.io/en/stable/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
docstring_section_style = "table"
show_source = false
allow_inspection = false
inherited_members = true
merge_init_into_class = true
separate_signature = true
show_signature_annotations = true
signature_crossrefs = true
show_root_heading = true
show_root_full_path = true
show_symbol_type_heading = true
show_symbol_type_toc = true
