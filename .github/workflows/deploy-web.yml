name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'moyo/**'
      - 'moyo-wasm/**'
      - 'moyopy/**'
      - 'moyoc/**'
      - 'apps/web/**'
      - 'apps/landing/**'
      - '.github/workflows/deploy-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'moyo/**'
      - 'moyo-wasm/**'
      - 'moyopy/**'
      - 'moyoc/**'
      - 'apps/web/**'
      - 'apps/landing/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          # Pin instead of `latest`: the action's "latest" resolution falls back
          # to the stale default v0.9.1, which predates Cargo workspace
          # inheritance and fails to parse `license.workspace = true`.
          version: 'v0.15.0'

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: '. -> target'

      - name: Build moyo-wasm
        run: wasm-pack build moyo-wasm --target web --release --scope spglib

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          # package-lock.json is gitignored in this repo, so key the npm
          # download cache (~/.npm) on the package.json files instead. The
          # cache still avoids re-downloading tarballs on `npm install`.
          cache-dependency-path: |
            apps/web/package.json
            moyo-wasm/package.json

      - name: Install web app dependencies
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Build web app (served under /<repo>/viewer/)
        working-directory: apps/web
        env:
          VITE_BASE: /${{ github.event.repository.name }}/viewer/
        run: npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'

      - name: Build moyopy wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          args: --release --out dist --manifest-path moyopy/Cargo.toml
          sccache: 'true'

      - name: Install moyopy and docs dependencies
        run: |
          set -e
          uv pip install --system --find-links dist moyopy
          uv pip install --system moyopy[docs]

      - name: Build docs with Zensical
        working-directory: moyopy
        run: zensical build --clean --strict

      - name: Build moyo-wasm API reference (TypeDoc) and doc site (Zensical)
        # The moyo-wasm pkg/ (and its .d.ts) was produced by the earlier
        # `wasm-pack build moyo-wasm` step; TypeDoc renders the reference from it.
        working-directory: moyo-wasm
        run: |
          set -e
          npm install --no-audit --no-fund
          npm run docs
          zensical build --clean --strict

      - name: Build landing hub with Zensical (artifact root)
        # The hub manages its own zensical via apps/landing/pyproject.toml, so it
        # does not depend on moyopy[docs].
        working-directory: apps/landing
        run: uv run zensical build --clean --strict

      - name: Assemble web viewer, Python docs and JS / WASM docs under the hub
        run: |
          set -e
          cp -r apps/web/dist apps/landing/site/viewer
          cp -r moyopy/site apps/landing/site/python
          cp -r moyo-wasm/site apps/landing/site/js

      - name: Install Doxygen
        uses: awalsh128/cache-apt-pkgs-action@5513791f75b039e2a79653b1a92238d3fb8d99b4 # v1.6.2
        with:
          packages: doxygen
          version: 1.0

      - name: Install cbindgen
        uses: taiki-e/install-action@9e1e5806d4a4822de933115878265be9aaa786d9 # v2.82.2
        with:
          tool: cbindgen

      - name: Build C landing page (Zensical), C API docs (Doxygen) and Fortran API docs (FORD) into web app under /c
        working-directory: moyoc
        run: |
          set -e
          cbindgen --config cbindgen.toml --output build/moyoc.h
          doxygen Doxyfile
          # Run FORD in an isolated env via uvx: it pins old markdown
          # (markdown-include / python-markdown-math) which would otherwise
          # downgrade the system markdown that Zensical needs.
          uvx ford ford.md
          zensical build --clean --strict
          cp -r site ../apps/landing/site/c

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: apps/landing/site

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
