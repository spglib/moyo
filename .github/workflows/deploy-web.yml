name: Deploy web app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'moyo/**'
      - 'moyo-wasm/**'
      - 'moyopy/**'
      - 'moyoc/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'moyo/**'
      - 'moyo-wasm/**'
      - 'moyopy/**'
      - 'moyoc/**'
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa # v0.4.0
        with:
          version: latest

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: '. -> target'

      - name: Build moyo-wasm
        run: wasm-pack build moyo-wasm --target web --release --scope spglib

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'

      - name: Install web app dependencies
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Build web app
        working-directory: apps/web
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Copy index.html to 404.html for SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Build moyopy wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          args: --release --out dist --manifest-path moyopy/Cargo.toml
          sccache: 'true'

      - name: Install moyopy and docs dependencies
        run: |
          set -e
          uv pip install --system --find-links dist moyopy
          uv pip install --system moyopy[docs]

      - name: Build docs into web app under /python
        run: sphinx-build moyopy/docs apps/web/dist/python

      - name: Install Doxygen
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends doxygen

      - name: Install cbindgen
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cbindgen

      - name: Build C API docs into web app under /c
        working-directory: moyoc
        run: |
          set -e
          cbindgen --config cbindgen.toml --output build/moyoc.h
          doxygen Doxyfile
          cp -r build/docs/html ../apps/web/dist/c

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: apps/web/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
