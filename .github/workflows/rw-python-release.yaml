name: Python Release CI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, perform a dry run without releasing'
        required: false
        type: boolean
        default: true
  workflow_call:
    inputs:
      dry_run:
        description: 'If true, perform a dry run without releasing'
        required: true
        type: boolean

env:
  PYTHON_VERSION: "3.13"

jobs:
  wheel:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: linux
            target: x86_64
          - os: ubuntu-latest
            system: linux
            target: aarch64
          - os: macos-latest
            system: darwin
            target: x86_64
          - os: macos-latest
            system: darwin
            target: aarch64
          - os: windows-latest
            system: windows
            target: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build wheels
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path moyopy/Cargo.toml
          sccache: 'true'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-${{ matrix.target }}-${{ matrix.system }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist --manifest-path moyopy/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pypi-sdist
          path: dist

  release:
    if: ${{ ! inputs.dry_run }}
    name: Release
    runs-on: ubuntu-latest
    needs: [wheel, sdist]
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: pypi-*
          merge-multiple: true
          path: dist
      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: false
          verbose: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          attestations: false
          verbose: true
