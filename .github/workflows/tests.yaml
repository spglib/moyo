name: CI

on:
  push:
    branches: [main]
  # No branch filter: also run for stacked pull requests that target a
  # feature branch instead of main
  pull_request:
  workflow_dispatch:

jobs:
  path-filter:
    runs-on: ubuntu-slim
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      c: ${{ steps.filter.outputs.c }}
      wasm: ${{ steps.filter.outputs.wasm }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        with:
          filters: .github/filters.yaml

  rust:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.rust == 'true' }}
    uses: ./.github/workflows/rw-rust-tests.yaml

  python:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.python == 'true' }}
    uses: ./.github/workflows/rw-python-tests.yaml
    permissions:
      id-token: write
      contents: read

  c:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.c == 'true' }}
    uses: ./.github/workflows/rw-c-tests.yaml

  wasm:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.wasm == 'true' }}
    uses: ./.github/workflows/rw-wasm-release.yaml
    with:
      dry_run: true
    permissions:
      id-token: write
      contents: write

  pass:
    if: always()
    name: ✅ Pass tests
    needs: [rust, python, c]
    runs-on: ubuntu-slim
    steps:
      - if: needs.rust.result == 'failure'
        run: exit 1
      - if: needs.python.result == 'failure'
        run: exit 1
      - if: needs.c.result == 'failure'
        run: exit 1
