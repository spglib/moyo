name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  path-filter:
    runs-on: ubuntu-slim
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      c: ${{ steps.filter.outputs.c }}
      wasm: ${{ steps.filter.outputs.wasm }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: .github/filters.yaml

  rust:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.rust == 'true' }}
    uses: ./.github/workflows/rw-rust-tests.yaml

  python:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.python == 'true' }}
    uses: ./.github/workflows/rw-python-tests.yaml
    permissions:
      id-token: write
      contents: write

  c:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.c == 'true' }}
    uses: ./.github/workflows/rw-c-tests.yaml

  wasm:
    needs: path-filter
    if: ${{ needs.path-filter.outputs.wasm == 'true' }}
    uses: ./.github/workflows/rw-wasm-release.yaml
    with:
      dry_run: true
    permissions:
      id-token: write
      contents: write

  pass:
    if: always()
    name: ✅ Pass tests
    needs: [rust, python, c]
    runs-on: ubuntu-slim
    steps:
      - if: needs.rust.result == 'failure'
        run: exit 1
      - if: needs.python.result == 'failure'
        run: exit 1
      - if: needs.c.result == 'failure'
        run: exit 1
