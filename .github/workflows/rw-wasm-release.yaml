name: Publish moyo-wasm to npm

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      dry_run:
        description: 'If true, perform a dry run without publishing'
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: taiki-e/install-action@04c040912e9aad75050107fac71418e0c88a6718 # wasm-pack

      - name: Install test dependencies
        working-directory: moyo-wasm
        run: npm install

      - name: Run tests
        working-directory: moyo-wasm
        run: npm test # this also builds the wasm package to be published in next step

      - name: Publish to npm
        if: "startsWith(github.ref, 'refs/tags/') && ! inputs.dry_run"
        working-directory: moyo-wasm/pkg
        run: npm publish --access public
