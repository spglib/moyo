name: C Release CI

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      dry_run:
        description: 'If true, perform a dry run without releasing'
        required: true
        type: boolean

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: cargo-bins/cargo-binstall@bdd791de5adfec6407aee16a3b287f12ba0ef2d8 # main
      - name: Install cbindgen
        run: cargo binstall cbindgen --locked --no-confirm --force
      - name: Install cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: awalsh128/cache-apt-pkgs-action@2c09a5e66da6c8016428a2172bd76e5e4f14bb17 # latest
        with:
          packages: gcc-aarch64-linux-gnu
          version: 1.0
      - name: Build and package
        shell: bash
        run: |
          set -e
          CMAKE_ARGS="-DRust_CARGO_TARGET=${{ matrix.target }} -DMOYOC_BUILD_TESTING=OFF"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc"
          fi
          cmake -S moyoc -B moyoc/build $CMAKE_ARGS
          cmake --build moyoc/build
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          DISTNAME=moyoc-$VERSION-${{ matrix.target }}
          cmake --install moyoc/build --prefix moyoc/dist/$DISTNAME
          tar czf moyoc/dist/$DISTNAME.tar.gz -C moyoc/dist $DISTNAME
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: moyoc-${{ matrix.target }}
          path: moyoc/dist/moyoc-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  merge-artifacts:
    needs: [build]
    runs-on: ubuntu-slim
    steps:
      - uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: artifacts
          pattern: moyoc-*

  release:
    if: ${{ ! inputs.dry_run }}
    needs: [merge-artifacts]
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: artifacts
          path: artifacts
      - name: Upload Release Assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: artifacts/moyoc-*
          fail_on_unmatched_files: true
