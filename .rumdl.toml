# Markdown linting and formatting (replaces mdformat).
# https://github.com/rvben/rumdl

[global]
flavor = "gfm"
# mdformat never enforced these, and the repo relies on long lines, inline HTML
# (README badges/figures), and non-heading first lines (HTML wrappers, snippets).
disable = ["MD013", "MD033", "MD041"]

# Zensical (MkDocs) pages use mkdocstrings (`:::`), autorefs (`[x][x]`) and
# pymdownx snippets (`--8<--`). The mkdocs flavor understands this syntax, which
# mdformat could not (those pages were previously excluded).
[per-file-flavor]
"moyopy/docs/**/*.md" = "mkdocs"
# The landing hub (apps/landing) is a Zensical site too: its index uses Material
# admonitions (`!!!`) and grid cards, which the gfm flavor would misread (e.g.
# MD046 treating indented admonition bodies as code blocks).
"apps/landing/docs/**/*.md" = "mkdocs"

# moyoc/README.md doubles as the Zensical landing page (included via snippet at
# moyoc/docs/index.md). Its `api/` links resolve correctly on the rendered site
# (/c/ -> /c/api/) but not relative to the README's own location, so MD057's
# "relative link does not exist" check would always flag them.
#
# moyoc/ford.md is the FORD project file; its front-page body links to the C API
# reference and migration guide, which resolve on the rendered site
# (/c/fortran-api/ -> /c/api/, /c/migration/) but not at lint time.
#
# apps/landing/docs/index.md links to the sibling binding sites (python/, c/,
# viewer/) that are assembled under the landing site root only at deploy time,
# so MD057 cannot see them at lint time even though they resolve when served.
[per-file-ignores]
"moyoc/README.md" = ["MD057"]
"moyoc/ford.md" = ["MD057"]
"apps/landing/docs/index.md" = ["MD057"]
